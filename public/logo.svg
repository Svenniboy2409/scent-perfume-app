<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f1e7"/>
      <stop offset="100%" stop-color="#efe5d4"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cda85f"/>
      <stop offset="100%" stop-color="#9c7526"/>
    </linearGradient>
  </defs>

  <!-- background (iOS masks the corners into a rounded square) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- rising scent drop -->
  <circle cx="256" cy="120" r="15" fill="#caa25a"/>

  <!-- cap -->
  <rect x="222" y="150" width="68" height="46" rx="8" fill="#b89042"/>
  <!-- neck -->
  <rect x="234" y="194" width="44" height="30" fill="#a07f38"/>

  <!-- flacon body -->
  <path d="M170 250 Q170 224 200 222 L312 222 Q342 224 342 250 L342 418 Q342 462 300 462 L212 462 Q170 462 170 418 Z"
        fill="url(#glass)" stroke="#87681f" stroke-width="6"/>
  <!-- glass highlight -->
  <path d="M196 252 Q196 236 210 236 L216 236 L216 452 Q200 452 196 430 Z" fill="#ffffff" opacity="0.16"/>

  <!-- engraved S -->
  <text x="256" y="392" text-anchor="middle"
        font-family="Georgia, 'Cormorant Garamond', serif"
        font-size="150" font-weight="700" fill="#fbf7ee">S</text>
</svg>
